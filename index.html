<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SAIL 디지털 항해일지</title>
    <link rel="stylesheet" href="./src/styles.css?v=20260504-safe1">
  </head>
  <body>
    <main id="app" class="app-shell"></main>

    <script>
      if (localStorage.getItem('SAIL_STORAGE_MIGRATION_V2') !== 'done') {
        localStorage.removeItem('SAIL_ROLE');
        localStorage.removeItem('SAIL_CLASS_CODE');
        localStorage.removeItem('SAIL_STUDENT_ID');
        localStorage.removeItem('SAIL_LOGIN_CODE');
        localStorage.setItem('SAIL_STORAGE_MIGRATION_V2', 'done');
      }
    </script>

    <script type="module" src="./src/app.js?v=20260504-safe1"></script>
    <script type="module" src="./src/teacher-emergency-dashboard.js?v=20260504-safe1"></script>
  </body>
